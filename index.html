<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 11 Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">Year 11</div>
        <div class="nav-icons">
            <span>🏠</span> <span>🔍</span> <span>🎬</span> <span>🛍️</span>
        </div>
        <div class="user-icon">👤</div>
    </div>

    <header>
        <h1>Best <span>retro</span> directory</h1>
        <div class="controls">
            <select id="class-select" onchange="initGame()">
                <option value="geography">Geography (11B1)</option>
                <option value="english">English (11B1)</option>
                <option value="maths">Maths (11B1)</option>
                <option value="science">Science (11B1)</option>
            </select>
            <button class="pill-btn reset" onclick="resetBoard()">Reset Game</button>
        </div>
        <div id="status-bar">CHOOSE YOUR CHARACTER TO START</div>
    </header>

    <main id="game-board"></main>

    <script src="script.js"></script>
</body>
</html>
