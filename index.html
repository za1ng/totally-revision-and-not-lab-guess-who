<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totally Revision</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">LAB Guess Who</div>
        <div class="user-icon">PROFILE</div>
    </div>

    <header>
        <h1>Class <span>Database</span></h1>
        <div class="controls">
            <select id="class-select" onchange="initGame()">
                <option value="geography">Geography (11B1)</option>
                <option value="english">English (11B1)</option>
                <option value="maths">Maths (11B1)</option>
                <option value="science">Science (11B1)</option>
            </select>
            
            <button class="pill-btn reset" onclick="resetBoard()">
                <span class="arrow">→</span> Reset Board
            </button>
        </div>
    </header>

    <main id="game-board"></main>

    <script src="script.js"></script>
</body>
</html>
